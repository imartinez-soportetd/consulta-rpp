input {
  tcp {
    port => 5000
    codec => json
  }
}

filter {
  if [type] == "backend" {
    grok {
      match => { "message" => "%{TIMESTAMP_ISO8601:timestamp} \[%{WORD:level}\] %{DATA:service}: %{GREEDYDATA:message}" }
    }
    date {
      match => ["timestamp", "ISO8601"]
    }
  }

  if [level] =~ /ERROR|CRITICAL/ {
    mutate {
      add_field => { "alert" => true }
    }
  }
}

output {
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "consulta-rpp-%{+YYYY.MM.dd}"
  }

  if [alert] == true {
    email {
      to => "${ALERT_EMAIL}"
      subject => "ERROR from ConsultaRPP: %{service}"
      body => "Service: %{service}\nLevel: %{level}\nMessage: %{message}\nTimestamp: %{timestamp}"
    }
  }
}
