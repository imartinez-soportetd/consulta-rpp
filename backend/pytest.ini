[pytest]
# Pytest configuration for ConsultaRPP
asyncio_mode = auto
python_files = test_*.py
python_classes = Test*
python_functions = test_*
testpaths = backend/tests
addopts = 
    -ra
    --strict-markers
    --strict-config
    --tb=short
    --disable-warnings

# Coverage settings
[coverage:run]
branch = True
parallel = True
source = 
    app
omit = 
    */tests/*
    */test_*.py
    */__init__.py
    */venv/*

[coverage:report]
precision = 2
skip_covered = False
show_missing = True
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod
    @abstractproperty

fail_under = 80

[coverage:html]
directory = backend/htmlcov
