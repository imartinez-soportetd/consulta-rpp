<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Limpiar Caché - ConsultaRPP</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            text-align: center;
            max-width: 400px;
        }

        h1 {
            color: #333;
            margin-bottom: 20px;
        }

        p {
            color: #666;
            margin-bottom: 30px;
        }

        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            transition: background 0.3s;
        }

        button:hover {
            background: #764ba2;
        }

        .success {
            color: #4caf50;
            display: none;
            margin-top: 20px;
        }

        .status {
            margin-top: 20px;
            padding: 15px;
            background: #f5f5f5;
            border-radius: 4px;
            text-align: left;
            font-size: 14px;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>🧹 Limpiar Caché</h1>
        <p>Esto eliminará los datos almacenados localmente y reseteará la aplicación.</p>
        <button onclick="clearCache()">Limpiar Caché y Recargar</button>
        <div class="success" id="success">✓ Caché limpiado correctamente</div>
        <div class="status" id="status"></div>
    </div>

    <script>
        function clearCache() {
            const statusEl = document.getElementById('status');
            const successEl = document.getElementById('success');

            try {
                // Limpiar localStorage
                localStorage.clear();
                statusEl.innerHTML += '✓ localStorage limpiado<br>';

                // Limpiar sessionStorage
                sessionStorage.clear();
                statusEl.innerHTML += '✓ sessionStorage limpiado<br>';

                // Limpiar IndexedDB (si existe)
                if (window.indexedDB) {
                    const dbs = await indexedDB.databases();
                    dbs.forEach(db => {
                        indexedDB.deleteDatabase(db.name);
                    });
                    statusEl.innerHTML += '✓ IndexedDB limpiado<br>';
                }

                successEl.style.display = 'block';
                statusEl.innerHTML += '<br>Redirigiendo en 2 segundos...';

                setTimeout(() => {
                    window.location.href = '/';
                }, 2000);

            } catch (error) {
                statusEl.innerHTML = '✗ Error: ' + error.message;
            }
        }
    </script>
</body>

</html>
