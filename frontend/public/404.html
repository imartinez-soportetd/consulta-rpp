<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Página no encontrada | Consulta RPP</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #006B83 0%, #00A3C4 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            max-width: 500px;
        }

        h1 {
            color: #006B83;
            font-size: 3em;
            margin-bottom: 10px;
        }

        p {
            color: #666;
            font-size: 1.1em;
            margin-bottom: 30px;
        }

        a {
            display: inline-block;
            background: #006B83;
            color: white;
            padding: 12px 30px;
            border-radius: 4px;
            text-decoration: none;
            transition: background 0.3s;
        }

        a:hover {
            background: #003D47;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>404</h1>
        <p>Página no encontrada</p>
        <p>La página que buscas no existe o ha sido movida.</p>
        <a href="/">Volver al inicio</a>
    </div>
</body>

</html>
