# Cron Jobs Configuration for Production
# Install with: crontab -e
# Then copy these lines to your crontab

# =============================================================================
# Database Backups
# =============================================================================

# Daily backup at 2:00 AM
0 2 * * * cd /home/user/consulta-rpp && bash scripts/backup-db.sh daily >> /var/log/consulta-rpp-backup.log 2>&1

# Weekly full backup every Sunday at 1:00 AM
0 1 * * 0 cd /home/user/consulta-rpp && bash scripts/backup-db.sh weekly >> /var/log/consulta-rpp-backup.log 2>&1

# Archive old backups to S3 on 1st of month
0 0 1 * * cd /home/user/consulta-rpp && aws s3 cp /backups/ s3://backup-bucket/consulta-rpp/ --recursive >> /var/log/consulta-rpp-backup.log 2>&1

# =============================================================================
# Health Checks
# =============================================================================

# Health check every 5 minutes (24/7)
*/5 * * * * cd /home/user/consulta-rpp && bash scripts/health-check-prod.sh >> /var/log/consulta-rpp-health.log 2>&1

# Extended health check at 4:00 AM daily
0 4 * * * cd /home/user/consulta-rpp && bash scripts/health-check-prod.sh >> /var/log/consulta-rpp-health-full.log 2>&1

# =============================================================================
# Log Rotation & Cleanup
# =============================================================================

# Rotate logs daily at midnight
0 0 * * * cd /home/user/consulta-rpp && logrotate -f /home/user/consulta-rpp/logrotate.conf >> /var/log/consulta-rpp-rotation.log 2>&1

# Clean old deployment logs (keep 30 days)
0 3 * * * find /home/user/consulta-rpp/logs/deploy_* -mtime +30 -delete

# Clean old health check logs (keep 7 days)
0 3 * * * find /home/user/consulta-rpp/logs/health-checks/health_* -mtime +7 -delete

# =============================================================================
# SSL Certificate Renewal
# =============================================================================

# Renew SSL certificates (Certbot automatic renewal)
0 12 * * * /usr/bin/certbot renew --quiet

# Verify certificates monthly
0 0 1 * * openssl x509 -in /etc/nginx/ssl/consulta-rpp.com.crt -noout -dates | mail -s "SSL Certificate Status" ops-team@consulta-rpp.com

# =============================================================================
# Database Maintenance
# =============================================================================

# Weekly VACUUM (cleanup deleted rows) on Sunday at 3:00 AM
0 3 * * 0 cd /home/user/consulta-rpp && docker-compose -f docker-compose.prod.yml exec -T db \
  psql -U consulta_rpp_user -d consulta_rpp_prod -c "VACUUM;" >> /var/log/consulta-rpp-maintenance.log 2>&1

# Weekly ANALYZE (update statistics) on Wednesday at 3:00 AM
0 3 * * 3 cd /home/user/consulta-rpp && docker-compose -f docker-compose.prod.yml exec -T db \
  psql -U consulta_rpp_user -d consulta_rpp_prod -c "ANALYZE;" >> /var/log/consulta-rpp-maintenance.log 2>&1

# Weekly REINDEX on Friday at 3:00 AM
0 3 * * 5 cd /home/user/consulta-rpp && docker-compose -f docker-compose.prod.yml exec -T db \
  psql -U consulta_rpp_user -d consulta_rpp_prod -c "REINDEX DATABASE consulta_rpp_prod;" >> /var/log/consulta-rpp-maintenance.log 2>&1

# =============================================================================
# Monitoring & Alerts
# =============================================================================

# Push metrics to monitoring service every 5 minutes
*/5 * * * * cd /home/user/consulta-rpp && curl -X POST http://monitoring.internal/api/metrics \
  -H "Content-Type: application/json" \
  -d '{"timestamp":"'$(date +%s)'","status":"ok"}' >> /var/log/consulta-rpp-metrics.log 2>&1

# Weekly security check
0 5 * * 1 cd /home/user/consulta-rpp && bash scripts/security-check.sh | mail -s "Weekly Security Report" security-team@consulta-rpp.com

# =============================================================================
# Notification/Reporting
# =============================================================================

# Daily summary report at 8:00 AM
0 8 * * * cd /home/user/consulta-rpp && bash scripts/daily-report.sh | mail -s "Daily Report - $(date +%Y-%m-%d)" ops-team@consulta-rpp.com

# Weekly report on Monday at 9:00 AM
0 9 * * 1 cd /home/user/consulta-rpp && bash scripts/weekly-report.sh | mail -s "Weekly Report - $(date +%Y%V)" ops-team@consulta-rpp.com

# =============================================================================
# Important Notes
# =============================================================================
# - Replace /home/user with actual user home directory
# - Replace email addresses with actual team emails
# - Replace S3 bucket with actual backup bucket
# - Ensure all scripts have execute permissions (chmod +x)
# - Test each cron job manually before entering production
# - Monitor cron logs: /var/log/syslog (on Linux) or /var/log/system.log (on macOS)
# - Check crontab syntax with: crontab -l and crontab -e
# - For timezone issues, set: TZ=America/Mexico_City
